<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="福彩对照" />
    <meta name="theme-color" content="#f7f4ff" />
    <title>福彩开奖对照</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="page-bg" aria-hidden="true">
      <div class="page-bg-lake"></div>
      <div class="page-bg-overlay"></div>
    </div>
    <div class="wrap">
      <header class="hero">
        <button type="button" id="menuBtn" class="menu-trigger" aria-label="打开菜单">
          <span></span><span></span><span></span>
        </button>
        <div class="hero-badge">✨ 号码小助手</div>
        <h1>开奖对照</h1>
      </header>

      <select id="lotteryType" class="visually-hidden" tabindex="-1" aria-hidden="true">
        <option value="ssq">双色球</option>
        <option value="fcsd">福彩3D</option>
        <option value="qlc">七乐彩</option>
        <option value="klb">快乐8</option>
      </select>

      <section class="card card-accent card-draw">
        <div class="card-head card-head-split">
          <div class="card-head-left">
            <span class="card-icon">🎱</span>
            <h2>最新开奖</h2>
          </div>
          <span id="currentLotteryLabel" class="lottery-chip">双色球</span>
        </div>
        <div id="drawMeta" class="draw-meta">暂无数据</div>
        <div id="nextDrawMeta" class="next-draw-meta hidden"></div>
        <div id="drawBalls" class="balls draw-balls"></div>
        <div class="action-bar">
          <button id="refreshBtn" type="button" class="btn btn-primary">
            <span class="btn-icon">↻</span>刷新开奖
          </button>
          <button id="compareBtn" type="button" class="btn btn-gold">
            <span class="btn-icon">♡</span>重新对照
          </button>
        </div>
        <div id="fetchStatus" class="status-line">点一下刷新，获取最新开奖 ~</div>
      </section>

      <section class="card card-scan">
        <div class="card-head">
          <span class="card-icon">📷</span>
          <h2>拍照识别</h2>
        </div>
        <p class="hint">对准号码区，尽量拍全票面；也可从相册选已有照片。首次加载 PaddleOCR 模型约需十几秒。</p>
        <div class="scan-actions">
          <label class="scan-btn">
            <span class="scan-btn-icon" aria-hidden="true"></span>
            <span class="scan-btn-text">拍摄彩票识别</span>
            <input id="cameraInput" type="file" accept="image/*" capture="environment" hidden />
          </label>
          <label class="scan-btn scan-btn-secondary">
            <span class="scan-btn-icon scan-btn-icon-album" aria-hidden="true"></span>
            <span class="scan-btn-text">从相册选择</span>
            <input id="galleryInput" type="file" accept="image/*" hidden />
          </label>
        </div>
        <div id="ocrPreviewWrap" class="ocr-preview-wrap hidden">
          <img id="ocrPreview" alt="彩票照片预览" />
        </div>
        <div id="ocrProgressWrap" class="ocr-progress hidden" aria-hidden="true">
          <div
            id="ocrProgressTrack"
            class="ocr-progress-track"
            role="progressbar"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
          >
            <div id="ocrProgressFill" class="ocr-progress-fill"></div>
          </div>
          <span id="ocrProgressPct" class="ocr-progress-pct">0%</span>
        </div>
        <div id="ocrStatus" class="status ocr-status-line"></div>
        <details id="ocrRawWrap" class="ocr-raw hidden">
          <summary>查看识别原文</summary>
          <pre id="ocrRawText"></pre>
        </details>
      </section>

      <section class="card card-result">
        <div class="card-head">
          <span class="card-icon">🏆</span>
          <h2>对照结果</h2>
        </div>
        <div id="compareResults">
          <div class="empty-state">拍照识别后，对照结果会显示在这里 ~</div>
        </div>
      </section>
    </div>
    <span id="appVersion" class="app-version" aria-hidden="true"></span>

    <div id="menuPanel" class="menu-panel hidden" aria-hidden="true">
      <div class="menu-backdrop" id="menuBackdrop"></div>
      <div class="menu-sheet" role="dialog" aria-label="设置菜单">
        <div class="menu-sheet-handle"></div>
        <button type="button" id="menuClose" class="menu-close" aria-label="关闭">×</button>
        <nav class="lottery-tabs" id="lotteryTabs" aria-label="选择彩种">
          <button type="button" class="lottery-tab active" data-type="ssq">双色球</button>
          <button type="button" class="lottery-tab" data-type="fcsd">福彩3D</button>
          <button type="button" class="lottery-tab" data-type="qlc">七乐彩</button>
          <button type="button" class="lottery-tab" data-type="klb">快乐8</button>
        </nav>
        <div class="menu-field">
          <input id="issueNo" type="text" placeholder="指定开奖期号（可选）" />
        </div>
        <div id="localAccess" class="menu-local hidden">
          <div id="accessInfo" class="local-access-body"></div>
        </div>
      </div>
    </div>

    <script type="module" src="./ocr-engine.mjs"></script>
    <script src="./ocr.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
