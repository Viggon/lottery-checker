<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>stall monitor</title>
  </head>
  <body>
    <script>
      (function () {
        function getStallMs() {
          try {
            var p = parent;
            if (p.__ocrStallMs > 0) return p.__ocrStallMs;
            if (p.__ocrCloudStallMs > 0) return p.__ocrCloudStallMs;
            if (
              p.LotteryOcr &&
              p.LotteryOcr.prefersHelloLotteryApi &&
              p.LotteryOcr.prefersHelloLotteryApi()
            ) {
              return 120000;
            }
          } catch (e) {}
          return 8000;
        }
        function showOnParent(msg, log) {
          var p = parent;
          var d = p.document;
          p.__ocrErrorShown = true;
          p.__ocrScanActive = false;
          var boot = d.getElementById("bootOverlay");
          if (boot) boot.classList.add("hidden");
          var banner = d.getElementById("ocrStallBanner");
          var bannerText = d.getElementById("ocrStallBannerText");
          if (banner && bannerText) {
            bannerText.textContent = msg;
            banner.classList.remove("hidden");
          }
          var overlay = d.getElementById("ocrFatalOverlay");
          var msgEl = d.getElementById("ocrFatalMsg");
          var logEl = d.getElementById("ocrFatalLog");
          if (overlay && msgEl) {
            msgEl.textContent = msg;
            if (logEl) logEl.textContent = log || "";
            overlay.style.display = "flex";
            d.body.style.overflow = "hidden";
          }
          var modal = d.getElementById("ocrErrorModal");
          var modalMsg = d.getElementById("ocrErrorMessage");
          var modalLog = d.getElementById("ocrErrorLog");
          if (modal && modalMsg && modalLog) {
            modalMsg.textContent = msg;
            modalLog.textContent = log || "";
            modal.classList.remove("hidden");
            modal.setAttribute("aria-hidden", "false");
          }
          var st = d.getElementById("ocrStatus");
          if (st) {
            st.textContent = msg;
            st.className = "status ocr-status-line error";
          }
          try {
            if (p.navigator.vibrate) p.navigator.vibrate([300, 120, 300]);
          } catch (e1) {}
        }
        function fire(msg, log) {
          try {
            showOnParent(msg, log);
          } catch (e) {}
          try {
            if (typeof parent.__showOcrFatal === "function") {
              parent.__showOcrFatal(msg, log);
            }
          } catch (e2) {}
        }
        function check() {
          try {
            var p = parent;
            if (!p.__ocrScanActive || p.__ocrErrorShown) return;
            var stallMs = getStallMs();
            var stalled = Date.now() - (p.__ocrLastProgressAt || 0);
            if (stalled < stallMs) return;
            var stuckMsg = p.__ocrLastProgressMsg || "未知步骤";
            var errMsg =
              "识别卡住：" +
              stuckMsg +
              "（已 " +
              Math.round(stalled / 1000) +
              " 秒无进展）";
            var snap = {
              version: p.__appVersion || "?",
              lastStatus: stuckMsg,
              cvReady: !!(p.cv && p.cv.Mat),
              ua: p.navigator.userAgent,
            };
            var log = (p.__lotteryOcrDiag || [])
              .concat(["---", JSON.stringify(snap, null, 2)])
              .join("\n");
            fire(errMsg, log);
          } catch (e) {}
        }
        setInterval(check, 500);
      })();
    </script>
  </body>
</html>
